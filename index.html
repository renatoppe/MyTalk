<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyTalk v1.3.1</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#10131a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyTalk" />

  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --panel-3: #11151d;
      --text: #e8ecf1;
      --muted: #97a3b6;
      --accent: #58a6ff;
      --accent-2: #7cc0ff;
      --border: #2a3140;
      --user: #21314d;
      --brain: #1c2a22;
      --system: #2d2415;
      --system-text: #f3d088;
      --ok: #2fbf71;
      --bad: #e05d5d;
      --warn: #ffcc66;
      --spotify: #1db954;
      --shopping: #ffa657;
      --lesson: #8b5cf6;
      --task: #f97316;
      --generic: #7c8aa5;
      --card: rgba(255,255,255,0.04);
      --shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .app {
      width: 100%;
      max-width: 920px;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: linear-gradient(180deg, #10131a 0%, #0f1115 100%);
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(23, 26, 33, 0.94);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
    }

    .titlewrap h1 {
      margin: 0;
      font-size: 22px;
    }

    .titlewrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      position: relative;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: 120ms ease;
    }

    button:hover { border-color: var(--accent); }
    button:disabled { opacity: 0.6; cursor: default; }

    button.primary {
      background: var(--accent);
      color: #08111f;
      border-color: transparent;
      font-weight: 700;
    }

    .floating-panel {
      position: absolute;
      right: 16px;
      top: 74px;
      width: min(430px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: none;
      z-index: 30;
    }

    .floating-panel.open { display: block; }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-close {
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    .quick-panel-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quick-label {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent-2);
    }

    .panel-grid {
      display: grid;
      gap: 12px;
    }

    .panel-grid label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .panel-grid input,
    .panel-grid select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    .panel-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }

    .messages {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .bubble {
      max-width: 88%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow);
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--user);
    }

    .bubble.brain {
      align-self: flex-start;
      background: var(--brain);
    }

    .bubble.system {
      align-self: center;
      background: var(--system);
      color: var(--system-text);
      max-width: 94%;
    }

    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .actions-box {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .action-card {
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--card);
      border: 1px dashed var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .action-card.spotify { border-color: rgba(29,185,84,0.35); background: rgba(29,185,84,0.08); }
    .action-card.shopping { border-color: rgba(255,166,87,0.35); background: rgba(255,166,87,0.08); }
    .action-card.lesson { border-color: rgba(139,92,246,0.35); background: rgba(139,92,246,0.08); }
    .action-card.task { border-color: rgba(249,115,22,0.35); background: rgba(249,115,22,0.08); }

    .action-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .action-line { margin-top: 2px; }

    .debug-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(124,138,165,0.08);
      border: 1px dashed rgba(124,138,165,0.35);
      color: var(--muted);
      font-size: 12px;
    }

    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-size: 13px;
      padding: 0 4px;
    }

    .composer {
      border-top: 1px solid var(--border);
      background: rgba(23, 26, 33, 0.97);
      padding: 14px 16px 18px;
      position: sticky;
      bottom: 0;
      z-index: 20;
    }

    .composer-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 72px;
      max-height: 180px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }

    .composer-actions {
      display: grid;
      gap: 10px;
      min-width: 150px;
    }

    .helper {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
    }

    .attachment-card,
    .export-card {
      margin-top: 12px;
      border-radius: 14px;
      border: 1px solid rgba(88,166,255,0.28);
      background: rgba(88,166,255,0.08);
      padding: 12px;
    }

    .attachment-head,
    .export-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .attachment-title,
    .export-title {
      font-weight: 700;
      color: var(--text);
    }

    .attachment-subtitle,
    .export-subtitle {
      color: var(--muted);
      font-size: 12px;
    }

    .attachment-preview {
      color: var(--text);
      font-size: 13px;
      margin-top: 8px;
      max-height: 140px;
      overflow: auto;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .attachment-actions,
    .export-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tiny {
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 999px;
    }

    .tiny.primary { color: #08111f; }

    .capabilities-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none !important; }

    @media (max-width: 700px) {
      .composer-inner { grid-template-columns: 1fr; }
      .composer-actions { grid-template-columns: 1fr 1fr 1fr; min-width: 0; }
      .bubble { max-width: 100%; }
      .floating-panel {
        right: 10px;
        left: 10px;
        width: auto;
        top: 82px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="titlewrap">
        <div class="title-row">
          <h1>MyTalk</h1>
          <span class="title-status" id="brainInlineStatus">🔴 Offline</span>
        </div>
        <p>Standalone Brain chat client • v1.3.1</p>
      </div>

      <div class="top-actions">
        <button type="button" id="testBrainBtn">Test Brain</button>
        <button type="button" id="brainConfigBtn">Config</button>
        <button type="button" id="quickMessagesBtn">☰</button>
        <button type="button" id="clearChatBtn">Clear Chat</button>
      </div>
    </header>

    <main class="messages" id="aiMessages"></main>

    <footer class="composer">
      <div class="composer-inner">
        <div>
          <textarea id="aiInput" placeholder="Talk to Brain..."></textarea>
          <div class="helper">
            <span>Enter sends. Shift+Enter makes a new line.</span>
            <span id="helperState">Ready</span>
          </div>
        </div>
        <div class="composer-actions">
          <button type="button" id="attachBtn">Attach</button>
          <button type="button" id="micBtn">Microphone</button>
          <button type="button" class="primary" id="aiSendBtn">Send</button>
        </div>
      </div>
    </footer>

    <div class="floating-panel" id="brainConfigPanel" aria-hidden="true">
      <div class="panel-head">
        <strong>Brain connection</strong>
        <button type="button" class="panel-close" id="closeConfigBtn">✕</button>
      </div>

      <div class="panel-grid">
        <label>
          Brain URL
          <input id="brainUrlInput" type="text" placeholder="https://brain.tail..." />
        </label>

        <label>
          API Key
          <input id="brainApiKeyInput" type="password" placeholder="X-API-Key" />
        </label>

        <label>
          Endpoint
          <select id="brainEndpointSelect">
            <option value="/chat">/chat</option>
          </select>
        </label>

        <label>
          Default Spotify device
          <select id="defaultSpotifyDeviceSelect">
            <option value="bedroom">bedroom</option>
            <option value="oppo">oppo</option>
          </select>
        </label>

        <label class="mini-pill" style="justify-content:flex-start;">
          <input type="checkbox" id="debugToggle" />
          Debug
        </label>
      </div>

      <div class="panel-row" style="justify-content:flex-end; margin-top: 12px;">
        <button type="button" id="saveConfigBtn" class="primary">Save</button>
      </div>
    </div>

    <div class="floating-panel" id="quickMessagesPanel" aria-hidden="true">
      <div class="panel-head">
        <strong>Quick messages</strong>
        <button type="button" class="panel-close" id="closeQuickBtn">✕</button>
      </div>
      <div class="quick-panel-wrap">
        <p class="quick-label">Tap one to fill the chat box.</p>
        <div class="chips">
          <button class="chip" data-fill="play spotify on bedroom">Play bedroom</button>
          <button class="chip" data-fill="pause spotify on bedroom">Pause bedroom</button>
          <button class="chip" data-fill="play spotify playlist gym on bedroom">Gym playlist</button>
          <button class="chip" data-fill="play spotify playlist sapuleco on bedroom">Sapuleco</button>
          <button class="chip" data-fill="play spotify song so easy by olivia on bedroom">Olivia - So Easy</button>
          <button class="chip" data-fill="play spotify on oppo">Play oppo</button>
          <button class="chip" data-fill="pause spotify on oppo">Pause oppo</button>
          <button class="chip" data-fill="next song on oppo">Next oppo</button>
          <button class="chip" data-fill="create a lesson plan for grade 4 animals 80 minutes">Lesson plan</button>
          <button class="chip" data-fill="create a short test about food and drinks for grade 4">Test</button>
          <button class="chip" data-fill="list my projects">Coder</button>
        </div>
      </div>
    </div>

    <div class="floating-panel" id="attachPanel" aria-hidden="true">
      <div class="panel-head">
        <strong>Attach to Brain</strong>
        <button type="button" class="panel-close" id="closeAttachBtn">✕</button>
      </div>

      <div class="panel-grid">
        <label>
          Title override
          <input id="attachTitleInput" type="text" placeholder="Optional title" />
        </label>

        <label>
          Notes
          <input id="attachNotesInput" type="text" placeholder="Optional notes" />
        </label>

        <label>
          Tags
          <input id="attachTagsInput" type="text" placeholder="comma, separated, tags" />
        </label>

        <label class="mini-pill" style="justify-content:flex-start;">
          <input type="checkbox" id="pdfSplitToggle" />
          Split PDFs by pages when possible
        </label>

        <div class="panel-row">
          <button type="button" id="pickFilesBtn" class="primary">Pick file(s)</button>
        </div>

        <div class="capabilities-note" id="capabilitiesNote">
          Supported via Brain pipeline: txt, md, pdf, docx, csv, xlsx, pptx, png, jpg, jpeg, webp, zip.
        </div>
      </div>
    </div>

    <input id="hiddenFileInput" class="hidden" type="file" multiple
      accept=".txt,.md,.pdf,.docx,.csv,.xlsx,.pptx,.png,.jpg,.jpeg,.webp,.zip" />

  <script>
    const MYTALK_STORAGE_KEY = "mytalk_state_v130";
    const HISTORY_WINDOW_MS = 24 * 60 * 60 * 1000;

    const defaultState = {
      brain: {
        url: "",
        apiKey: "",
        endpoint: "/chat",
        lastStatus: "offline",
        defaultSpotifyDevice: "bedroom"
      },
      ui: {
        debug: false,
        lastActionSummary: "none"
      },
      capabilities: {
        names: []
      },
      content: {
        lastAttachment: null,
        attachments: []
      },
      aiChat: {
        messages: []
      }
    };

    let state = loadState();

    const els = {
      aiMessages: document.getElementById("aiMessages"),
      aiInput: document.getElementById("aiInput"),
      aiSendBtn: document.getElementById("aiSendBtn"),
      attachBtn: document.getElementById("attachBtn"),
      micBtn: document.getElementById("micBtn"),
      clearChatBtn: document.getElementById("clearChatBtn"),
      brainConfigBtn: document.getElementById("brainConfigBtn"),
      testBrainBtn: document.getElementById("testBrainBtn"),
      brainInlineStatus: document.getElementById("brainInlineStatus"),
      quickMessagesBtn: document.getElementById("quickMessagesBtn"),
      debugToggle: document.getElementById("debugToggle"),
      helperState: document.getElementById("helperState"),
      brainConfigPanel: document.getElementById("brainConfigPanel"),
      quickMessagesPanel: document.getElementById("quickMessagesPanel"),
      attachPanel: document.getElementById("attachPanel"),
      closeConfigBtn: document.getElementById("closeConfigBtn"),
      closeQuickBtn: document.getElementById("closeQuickBtn"),
      closeAttachBtn: document.getElementById("closeAttachBtn"),
      saveConfigBtn: document.getElementById("saveConfigBtn"),
      brainUrlInput: document.getElementById("brainUrlInput"),
      brainApiKeyInput: document.getElementById("brainApiKeyInput"),
      brainEndpointSelect: document.getElementById("brainEndpointSelect"),
      defaultSpotifyDeviceSelect: document.getElementById("defaultSpotifyDeviceSelect"),
      quickChips: Array.from(document.querySelectorAll(".chip")),
      hiddenFileInput: document.getElementById("hiddenFileInput"),
      pickFilesBtn: document.getElementById("pickFilesBtn"),
      attachTitleInput: document.getElementById("attachTitleInput"),
      attachNotesInput: document.getElementById("attachNotesInput"),
      attachTagsInput: document.getElementById("attachTagsInput"),
      pdfSplitToggle: document.getElementById("pdfSplitToggle"),
      capabilitiesNote: document.getElementById("capabilitiesNote")
    };

    init();

    function init() {
      pruneChatHistory();
      bindEvents();
      syncConfigInputs();
      renderAIMessages();
      refreshBrainStatusUI();
      refreshUIPills();

      if (!state.aiChat.messages.length) {
        aiPush(
          "system",
          "MyTalk v1.3.1 ready. Attach files or try: play spotify on bedroom, create a lesson plan for grade 4 animals 80 minutes, create a short test about food and drinks, or list my projects."
        );
      }

      if (state.brain.url) {
        discoverCapabilities().catch(() => {});
      }
    }

    function bindEvents() {
      els.aiSendBtn.addEventListener("click", () => aiSendMessage());

      els.attachBtn.addEventListener("click", () => togglePanel("attach"));
      els.pickFilesBtn.addEventListener("click", () => {
        els.hiddenFileInput.value = "";
        els.hiddenFileInput.click();
      });
      els.hiddenFileInput.addEventListener("change", (e) => {
        const files = Array.from(e.target.files || []);
        if (files.length) processSelectedFiles(files);
      });

      els.micBtn.addEventListener("click", () => {
        aiPush("system", "Microphone placeholder ready. Voice input can be added later without changing the Brain contract.");
      });

      els.aiInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          aiSendMessage();
        }
      });

      els.clearChatBtn.addEventListener("click", () => {
        state.aiChat.messages = [];
        saveState();
        renderAIMessages();
      });

      els.brainConfigBtn.addEventListener("click", () => togglePanel("config"));
      els.quickMessagesBtn.addEventListener("click", () => togglePanel("quick"));
      els.closeConfigBtn.addEventListener("click", closePanels);
      els.closeQuickBtn.addEventListener("click", closePanels);
      els.closeAttachBtn.addEventListener("click", closePanels);
      els.saveConfigBtn.addEventListener("click", saveBrainConfig);
      els.testBrainBtn.addEventListener("click", testBrainConnection);

      els.debugToggle.addEventListener("change", () => {
        state.ui.debug = !!els.debugToggle.checked;
        saveState();
        renderAIMessages();
      });

      els.quickChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          const text = chip.dataset.fill || "";
          els.aiInput.value = text;
          els.aiInput.focus();
          closePanels();
        });
      });

      els.aiMessages.addEventListener("click", handleMessageAreaClick);

      document.addEventListener("click", (e) => {
        const target = e.target;
        if (!(target instanceof Element)) return;
        const insideConfig = target.closest("#brainConfigPanel") || target.closest("#brainConfigBtn");
        const insideQuick = target.closest("#quickMessagesPanel") || target.closest("#quickMessagesBtn");
        const insideAttach = target.closest("#attachPanel") || target.closest("#attachBtn");
        if (!insideConfig && !insideQuick && !insideAttach) closePanels();
      });
    }

    async function handleMessageAreaClick(e) {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;

      const useBtn = target.closest("[data-use-attachment]");
      if (useBtn) {
        const attachmentId = useBtn.getAttribute("data-use-attachment");
        const action = useBtn.getAttribute("data-action") || "chat";
        const attachment = (state.content.attachments || []).find((item) => item.id === attachmentId);
        if (!attachment) return;

        const map = {
          chat: {
            moduleTarget: "general",
            message: `Use the attached content "${attachment.title}" in the chat.`
          },
          lesson: {
            moduleTarget: "lesson_plan_generate",
            message: `Create a lesson plan based on the attached content "${attachment.title}".`
          },
          test: {
            moduleTarget: "test_generator",
            message: `Create a test based on the attached content "${attachment.title}".`
          },
          code: {
            moduleTarget: "coder",
            message: `Use the attached content "${attachment.title}" to help with code generation or editing.`
          },
          translate: {
            moduleTarget: "translate",
            message: `Translate the attached content "${attachment.title}".`
          },
          summarize: {
            moduleTarget: "general",
            message: `Summarize the attached content "${attachment.title}".`
          }
        };

        const chosen = map[action] || map.chat;
        await aiSendMessage(chosen.message, {
          contentIds: attachment.content_ids || [],
          moduleTarget: chosen.moduleTarget,
          attachmentTitle: attachment.title
        });
        return;
      }

      const exportBtn = target.closest("[data-export-from]");
      if (exportBtn) {
        const msgId = exportBtn.getAttribute("data-export-from");
        const format = exportBtn.getAttribute("data-format") || "txt";
        const msg = (state.aiChat.messages || []).find((item) => item.id === msgId);
        if (!msg) return;
        await exportMessage(msg, format);
      }
    }

    function openConfigPanel() {
      els.brainConfigPanel.classList.add("open");
      els.quickMessagesPanel.classList.remove("open");
      els.attachPanel.classList.remove("open");
      setAriaPanels("config");
    }

    function openQuickPanel() {
      els.quickMessagesPanel.classList.add("open");
      els.brainConfigPanel.classList.remove("open");
      els.attachPanel.classList.remove("open");
      setAriaPanels("quick");
    }

    function openAttachPanel() {
      els.attachPanel.classList.add("open");
      els.quickMessagesPanel.classList.remove("open");
      els.brainConfigPanel.classList.remove("open");
      setAriaPanels("attach");
    }

    function setAriaPanels(which) {
      els.brainConfigPanel.setAttribute("aria-hidden", which === "config" ? "false" : "true");
      els.quickMessagesPanel.setAttribute("aria-hidden", which === "quick" ? "false" : "true");
      els.attachPanel.setAttribute("aria-hidden", which === "attach" ? "false" : "true");
    }

    function closePanels() {
      els.brainConfigPanel.classList.remove("open");
      els.quickMessagesPanel.classList.remove("open");
      els.attachPanel.classList.remove("open");
      setAriaPanels("");
    }

    function togglePanel(which) {
      if (which === "config") {
        const willOpen = !els.brainConfigPanel.classList.contains("open");
        closePanels();
        if (willOpen) openConfigPanel();
        return;
      }
      if (which === "quick") {
        const willOpen = !els.quickMessagesPanel.classList.contains("open");
        closePanels();
        if (willOpen) openQuickPanel();
        return;
      }
      if (which === "attach") {
        const willOpen = !els.attachPanel.classList.contains("open");
        closePanels();
        if (willOpen) openAttachPanel();
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(MYTALK_STORAGE_KEY);
        if (!raw) return clone(defaultState);
        return deepMerge(clone(defaultState), JSON.parse(raw));
      } catch {
        return clone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(MYTALK_STORAGE_KEY, JSON.stringify(state));
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function deepMerge(base, extra) {
      if (!extra || typeof extra !== "object") return base;

      for (const [key, value] of Object.entries(extra)) {
        if (
          value &&
          typeof value === "object" &&
          !Array.isArray(value) &&
          base[key] &&
          typeof base[key] === "object" &&
          !Array.isArray(base[key])
        ) {
          base[key] = deepMerge(base[key], value);
        } else {
          base[key] = value;
        }
      }

      return base;
    }

    function pruneChatHistory() {
      const cutoff = Date.now() - HISTORY_WINDOW_MS;
      state.aiChat.messages = (state.aiChat.messages || []).filter((msg) => {
        const ts = new Date(msg.ts || 0).getTime();
        return Number.isFinite(ts) && ts >= cutoff;
      });
    }

    function syncConfigInputs() {
      els.brainUrlInput.value = state.brain.url || "";
      els.brainApiKeyInput.value = state.brain.apiKey || "";
      els.brainEndpointSelect.value = state.brain.endpoint || "/chat";
      els.defaultSpotifyDeviceSelect.value = state.brain.defaultSpotifyDevice || "bedroom";
      els.debugToggle.checked = !!state.ui.debug;
    }

    async function saveBrainConfig() {
      state.brain.url = normalizeBaseUrl(els.brainUrlInput.value);
      state.brain.apiKey = els.brainApiKeyInput.value.trim();
      state.brain.endpoint = els.brainEndpointSelect.value || "/chat";
      state.brain.defaultSpotifyDevice = els.defaultSpotifyDeviceSelect.value || "bedroom";

      saveState();
      syncConfigInputs();
      refreshBrainStatusUI();
      refreshUIPills();
      closePanels();
      aiPush("system", `Brain settings saved. Endpoint: ${state.brain.endpoint}. Default device: ${state.brain.defaultSpotifyDevice}.`);

      if (state.brain.url) {
        await discoverCapabilities().catch(() => {});
      }
    }

    function normalizeBaseUrl(url) {
      return (url || "").trim().replace(/\/+$/, "");
    }

    function aiPush(role, text, extra = {}) {
      state.aiChat.messages.push({
        id: `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
        role,
        text,
        ts: new Date().toISOString(),
        ...extra
      });
      pruneChatHistory();
      saveState();
      renderAIMessages();
      refreshUIPills();
    }

    function renderAIMessages() {
      els.aiMessages.innerHTML = "";

      for (const msg of state.aiChat.messages) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${msg.role}`;
        bubble.textContent = msg.text || "";

        const meta = document.createElement("div");
        meta.className = "meta";
        const bits = [`${msg.role.toUpperCase()} • ${formatTime(msg.ts)}`];
        if (msg.meta?.latency_ms) bits.push(`${msg.meta.latency_ms}ms`);
        if (msg.meta?.schema_version) bits.push(`schema ${msg.meta.schema_version}`);
        if (typeof msg.ok === "boolean") bits.push(`ok=${msg.ok}`);
        meta.textContent = bits.join(" • ");
        bubble.appendChild(meta);

        if (msg.attachment) {
          bubble.appendChild(renderAttachmentCard(msg.attachment));
        }

        if (msg.actions && msg.actions.length) {
          const actionsBox = document.createElement("div");
          actionsBox.className = "actions-box";
          for (const action of msg.actions) {
            actionsBox.appendChild(renderActionCard(action));
          }
          bubble.appendChild(actionsBox);
        }

        if (msg.role === "brain" && isExportableMessage(msg) && msg.requestContext?.exportRequested) {
          bubble.appendChild(renderExportCard(msg));
        }

        if (state.ui.debug && msg.role === "brain") {
          const debugBox = document.createElement("div");
          debugBox.className = "debug-box";
          const metaPretty = safeJson(msg.meta || {});
          const actionsPretty = safeJson(msg.actions || []);
          debugBox.innerHTML =
            `<div><strong>Debug</strong></div>` +
            `<div class="mono">endpoint: ${escapeHtml(state.brain.endpoint || "/chat")}</div>` +
            `<div class="mono">meta: ${escapeHtml(metaPretty)}</div>` +
            `<div class="mono">actions: ${escapeHtml(actionsPretty)}</div>`;
          bubble.appendChild(debugBox);
        }

        els.aiMessages.appendChild(bubble);
      }

      els.aiMessages.scrollTop = els.aiMessages.scrollHeight;
    }

    function renderAttachmentCard(attachment) {
      const wrap = document.createElement("div");
      wrap.className = "attachment-card";

      const head = document.createElement("div");
      head.className = "attachment-head";
      head.innerHTML = `
        <div>
          <div class="attachment-title">${escapeHtml(attachment.title || attachment.filename || "Attachment")}</div>
          <div class="attachment-subtitle">${escapeHtml(attachment.kind || "content")} • ${escapeHtml(attachment.file_type || "unknown")} • ${escapeHtml(attachment.status || "ready")}</div>
        </div>
      `;
      wrap.appendChild(head);

      if (attachment.preview) {
        const preview = document.createElement("div");
        preview.className = "attachment-preview";
        preview.textContent = attachment.preview;
        wrap.appendChild(preview);
      }

      const actions = document.createElement("div");
      actions.className = "attachment-actions";
      const buttons = [
        ["chat", "Chat"],
        ["lesson", "Lesson Plan"],
        ["test", "Tests"],
        ["code", "Code"],
        ["translate", "Translate"],
        ["summarize", "Summarize"]
      ];
      for (const [action, label] of buttons) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = action === "chat" ? "tiny primary" : "tiny";
        btn.textContent = label;
        btn.setAttribute("data-use-attachment", attachment.id);
        btn.setAttribute("data-action", action);
        actions.appendChild(btn);
      }
      wrap.appendChild(actions);
      return wrap;
    }

    function renderExportCard(msg) {
      const wrap = document.createElement("div");
      wrap.className = "export-card";

      const head = document.createElement("div");
      head.className = "export-head";
      const moduleTarget = msg.requestContext?.moduleTarget || "general";
      head.innerHTML = `
        <div>
          <div class="export-title">Manual export</div>
          <div class="export-subtitle">Only runs when you click a button</div>
        </div>
      `;
      wrap.appendChild(head);

      const actions = document.createElement("div");
      actions.className = "export-actions";

      const buttons = [
        ["txt", "TXT"],
        ["docx", "DOCX"],
        ["pdf", "PDF"]
      ];

      for (const [format, label] of buttons) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = format === "docx" ? "tiny primary" : "tiny";
        btn.textContent = `Export ${label}`;
        btn.setAttribute("data-export-from", msg.id);
        btn.setAttribute("data-format", format);
        actions.appendChild(btn);
      }

      wrap.appendChild(actions);
      return wrap;
    }

    function renderActionCard(action) {
      const card = document.createElement("div");
      card.className = "action-card";

      const title = document.createElement("div");
      title.className = "action-title";

      const type = String(action?.type || "unknown");
      const payload = action?.payload || {};
      const lowerType = type.toLowerCase();

      if (lowerType.includes("spotify")) {
        card.classList.add("spotify");
        title.textContent = "🎵 Spotify";
        card.appendChild(title);

        appendActionLine(card, `action: ${payload.action || "play"}`);
        appendActionLine(card, `device: ${payload.target_device || payload.device || state.brain.defaultSpotifyDevice}`);
        if (payload.playlist) appendActionLine(card, `playlist: ${payload.playlist}`);
        if (payload.song) appendActionLine(card, `song: ${payload.song}`);
        if (payload.artist) appendActionLine(card, `artist: ${payload.artist}`);
        if (payload.album) appendActionLine(card, `album: ${payload.album}`);
        if (!payload.playlist && !payload.song && !payload.artist && !payload.album) {
          appendActionLine(card, "content: spotify default play");
        }
        appendActionLine(card, "status: sent");
        return card;
      }

      if (lowerType.includes("shopping")) {
        card.classList.add("shopping");
        title.textContent = "🛒 Shopping";
        card.appendChild(title);

        appendActionLine(card, `type: ${type}`);
        if (payload.item) appendActionLine(card, `item: ${payload.item}`);
        if (payload.list_name) appendActionLine(card, `list: ${payload.list_name}`);
        if (payload.name) appendActionLine(card, `name: ${payload.name}`);
        appendActionLine(card, "status: sent");
        return card;
      }

      if (lowerType.includes("lesson")) {
        card.classList.add("lesson");
        title.textContent = "📚 Lesson Plan";
        card.appendChild(title);

        appendActionLine(card, `type: ${type}`);
        if (payload.grade) appendActionLine(card, `grade: ${payload.grade}`);
        if (payload.level) appendActionLine(card, `level: ${payload.level}`);
        if (payload.topic) appendActionLine(card, `topic: ${payload.topic}`);
        if (payload.duration || payload.duration_min) appendActionLine(card, `duration: ${payload.duration || payload.duration_min}`);
        appendActionLine(card, "status: generated");
        return card;
      }

      if (lowerType.includes("task")) {
        card.classList.add("task");
        title.textContent = "✅ Task";
        card.appendChild(title);

        appendActionLine(card, `type: ${type}`);
        if (payload.text) appendActionLine(card, `text: ${payload.text}`);
        if (payload.id) appendActionLine(card, `id: ${payload.id}`);
        appendActionLine(card, "status: sent");
        return card;
      }

      title.textContent = "⚡ Brain Action";
      card.appendChild(title);
      appendActionLine(card, `type: ${type}`);

      const keys = Object.keys(payload);
      if (!keys.length) {
        appendActionLine(card, "payload: empty");
        return card;
      }

      for (const key of keys) {
        appendActionLine(card, `${key}: ${stringifyValue(payload[key])}`);
      }

      return card;
    }

    function appendActionLine(card, text) {
      const line = document.createElement("div");
      line.className = "action-line";
      line.textContent = text;
      card.appendChild(line);
    }

    function stringifyValue(value) {
      if (value == null) return "null";
      if (typeof value === "object") {
        try { return JSON.stringify(value); }
        catch { return "[object]"; }
      }
      return String(value);
    }

    function formatTime(iso) {
      try {
        return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      } catch {
        return "--:--";
      }
    }

    async function aiSendMessage(forceText = "", options = {}) {
      let message = (forceText || els.aiInput.value || "").trim();
      if (!message) return;

      const standaloneExport = parseStandaloneExportRequest(message);
      if (!forceText && standaloneExport.requested) {
        const lastBrain = getLastBrainMessage();
        if (lastBrain) {
          els.aiInput.value = "";
          await exportMessage(lastBrain, standaloneExport.format);
        } else {
          aiPush("system", "There is no Brain answer to export yet.");
        }
        return;
      }

      if (!state.brain.url) {
        aiPush("system", "Set your Brain URL first in Brain Config.");
        openConfigPanel();
        return;
      }

      message = maybeApplyDefaultDevice(message);

      const requestContext = {
        moduleTarget: options.moduleTarget || "general",
        contentIds: options.contentIds || [],
        attachmentTitle: options.attachmentTitle || "",
        exportRequested: !!options.exportRequested || userAskedExport(message)
      };

      aiPush("user", message, { requestContext });
      els.aiInput.value = "";
      setComposerBusy(true);
      showTyping();

      try {
        const startedAt = performance.now();
        const data = await brainChat(message, requestContext);
        const latencyMs = Math.round(performance.now() - startedAt);

        hideTyping();

        const reply = data?.reply || data?.message || "No reply returned.";
        const actions = Array.isArray(data?.actions) ? data.actions : [];
        const meta = {
          ...(data?.meta || {}),
          latency_ms: latencyMs
        };

        aiPush("brain", reply, {
          actions,
          meta,
          ok: data?.ok,
          requestContext
        });

        updateLastActionSummary(actions);
        state.brain.lastStatus = "online";

        if (!data?.ok) {
          aiPush("system", data?.meta?.error || data?.meta?.detail || "Brain returned ok=false.");
        }
      } catch (err) {
        hideTyping();
        aiPush("system", classifyBrainError(err));
        state.brain.lastStatus = "offline";
      } finally {
        saveState();
        refreshBrainStatusUI();
        refreshUIPills();
        setComposerBusy(false);
      }
    }

    function userAskedExport(message) {
      const low = String(message || "").toLowerCase();
      return /\b(export|download|docx|pdf|txt|file|arquivo|baixar|baixavel|baixável|anexo|attachment)\b/.test(low);
    }

    function parseStandaloneExportRequest(message) {
      const low = String(message || "").toLowerCase().trim();
      const requested = /\b(export|download|baixar|arquivo|anexo|attachment)\b/.test(low) || /\b(docx|pdf|txt)\b/.test(low);
      if (!requested) return { requested: false, format: "txt" };
      if (/\bpdf\b/.test(low)) return { requested: true, format: "pdf" };
      if (/\b(docx|word)\b/.test(low)) return { requested: true, format: "docx" };
      return { requested: true, format: "txt" };
    }

    function getLastBrainMessage() {
      const msgs = state.aiChat.messages || [];
      for (let i = msgs.length - 1; i >= 0; i--) {
        if (msgs[i].role === "brain" && (msgs[i].text || "").trim()) return msgs[i];
      }
      return null;
    }

    function maybeApplyDefaultDevice(message) {
      const low = message.toLowerCase();
      const device = state.brain.defaultSpotifyDevice || "bedroom";

      const spotifyLike =
        low.startsWith("play spotify") ||
        low.startsWith("pause spotify") ||
        low.startsWith("resume spotify") ||
        low.startsWith("stop spotify") ||
        low.startsWith("next") ||
        low.startsWith("previous");

      if (!spotifyLike) return message;
      if (/\bon\s+(bedroom|oppo|main)\b/i.test(message)) return message;

      return `${message} on ${device}`;
    }

    function showTyping() {
      const el = document.createElement("div");
      el.className = "typing";
      el.id = "typingIndicator";
      el.textContent = "Brain is thinking...";
      els.aiMessages.appendChild(el);
      els.aiMessages.scrollTop = els.aiMessages.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById("typingIndicator");
      if (typing) typing.remove();
    }

    function setComposerBusy(isBusy) {
      els.aiSendBtn.disabled = isBusy;
      els.aiSendBtn.textContent = isBusy ? "Sending..." : "Send";
      els.aiInput.disabled = isBusy;
      els.attachBtn.disabled = isBusy;
      els.micBtn.disabled = isBusy;
      els.helperState.textContent = isBusy ? "Sending to Brain..." : "Ready";
    }

    async function brainChat(message, requestContext = {}) {
      const url = `${state.brain.url}${state.brain.endpoint || "/chat"}`;
      const headers = { "Content-Type": "application/json" };
      if (state.brain.apiKey) headers["X-API-Key"] = state.brain.apiKey;

      const payload = {
        message,
        scope: "global"
      };

      if (requestContext.moduleTarget && requestContext.moduleTarget !== "general") {
        payload.module_target = requestContext.moduleTarget;
      }
      if (Array.isArray(requestContext.contentIds) && requestContext.contentIds.length) {
        payload.content_ids = requestContext.contentIds;
      }

      const response = await fetchWithTimeout(
        url,
        {
          method: "POST",
          headers,
          body: JSON.stringify(payload)
        },
        25000
      );

      if (!response.ok) {
        const text = await response.text().catch(() => "");
        throw new Error(`Brain HTTP ${response.status}${text ? ` — ${text}` : ""}`);
      }

      return response.json();
    }

    async function processSelectedFiles(files) {
      if (!files.length) return;
      if (!state.brain.url) {
        aiPush("system", "Set your Brain URL first in Brain Config.");
        openConfigPanel();
        return;
      }

      const tags = parseTags(els.attachTagsInput.value);
      const titleOverride = els.attachTitleInput.value.trim();
      const notes = els.attachNotesInput.value.trim();
      const pdfSplit = !!els.pdfSplitToggle.checked;

      setComposerBusy(true);
      closePanels();

      try {
        if (files.length > 1 && files.every(isImageFile)) {
          const uploadResults = [];
          for (const file of files) {
            uploadResults.push(await uploadContentFile(file));
          }

          const savedPaths = uploadResults.map((item) => item.saved_path).filter(Boolean);
          const batchResult = await runCapability("content_ingest_image_batch", {
            action: "ingest_image_batch",
            input_paths: savedPaths,
            source_app: "mytalk",
            module_target: "general",
            title: titleOverride || `Image batch (${files.length})`,
            notes,
            tags
          });

          const attachment = normalizeBatchAttachment(batchResult, files);
          pushAttachmentMessage(attachment);
          return;
        }

        if (files.length === 1 && isZipFile(files[0])) {
          const uploaded = await uploadContentFile(files[0]);
          const zipResult = await runCapability("content_ingest_zip", {
            action: "ingest_zip",
            input_path: uploaded.saved_path,
            source_app: "mytalk",
            module_target: "general",
            title: titleOverride || stripExt(files[0].name),
            notes,
            tags
          });

          const attachment = normalizeZipAttachment(zipResult, files[0]);
          pushAttachmentMessage(attachment);
          return;
        }

        for (const file of files) {
          const uploaded = await uploadContentFile(file);
          const attachment = await ingestSingleUploadedFile(uploaded, file, {
            titleOverride,
            notes,
            tags,
            pdfSplit
          });
          pushAttachmentMessage(attachment);
        }
      } catch (err) {
        aiPush("system", classifyBrainError(err));
      } finally {
        setComposerBusy(false);
      }
    }

    async function uploadContentFile(file) {
      const url = `${state.brain.url}/content/upload`;
      const headers = {};
      if (state.brain.apiKey) headers["X-API-Key"] = state.brain.apiKey;

      const body = new FormData();
      body.append("file", file);
      body.append("source_app", "mytalk");

      const response = await fetchWithTimeout(url, {
        method: "POST",
        headers,
        body
      }, 30000);

      if (!response.ok) {
        const text = await response.text().catch(() => "");
        throw new Error(`Upload HTTP ${response.status}${text ? ` — ${text}` : ""}`);
      }

      return response.json();
    }

    async function ingestSingleUploadedFile(uploaded, file, opts) {
      const detected = detectPipelineType(uploaded, file);
      const title = opts.titleOverride || stripExt(file.name);
      const commonPayload = {
        source_app: "mytalk",
        module_target: "general",
        title,
        notes: opts.notes,
        tags: opts.tags
      };

      let result;
      if (detected === "image") {
        result = await runCapability("content_ingest_image", {
          action: "ingest_image",
          input_path: uploaded.saved_path,
          ...commonPayload
        });
      } else {
        result = await runCapability("content_ingest_file", {
          action: "ingest_file",
          input_path: uploaded.saved_path,
          split_mode: opts.pdfSplit && file.name.toLowerCase().endsWith(".pdf") ? "pages" : "full",
          ...commonPayload
        });
      }

      return normalizeSingleAttachment(result, file, detected);
    }

    function pushAttachmentMessage(attachment) {
      state.content.lastAttachment = attachment;
      const attachments = Array.isArray(state.content.attachments) ? state.content.attachments : [];
      attachments.unshift(attachment);
      state.content.attachments = attachments.slice(0, 20);
      saveState();

      aiPush("system", `Attached: ${attachment.title}`, { attachment });
    }

    function normalizeSingleAttachment(result, file, detected) {
      const contentIds = [];
      let preview = "";
      let fileType = result?.file_type || file.name.split(".").pop() || detected;

      if (Array.isArray(result?.items)) {
        contentIds.push(...result.items.map((item) => item.content_id).filter(Boolean));
        preview = result.items.map((item) => `[Page ${item.page || "?"}] ${item.preview || ""}`).join("\n\n").slice(0, 1200);
      } else if (result?.content_id) {
        contentIds.push(result.content_id);
        preview = result.extracted_text_preview || result.preview || "";
      }

      return {
        id: `att_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
        title: stripExt(file.name),
        filename: file.name,
        kind: detected,
        file_type: fileType,
        preview: preview || "No preview returned.",
        content_ids: contentIds,
        status: result?.ok ? "ready" : "failed",
        raw: result
      };
    }

    function normalizeBatchAttachment(result, files) {
      const contentIds = [];
      const previews = [];
      for (const item of (result?.items || [])) {
        const inner = item?.result || {};
        if (inner.content_id) contentIds.push(inner.content_id);
        if (inner.extracted_text_preview) previews.push(inner.extracted_text_preview);
      }

      return {
        id: `att_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
        title: `${files.length} images`,
        filename: files.map((f) => f.name).join(", "),
        kind: "image_batch",
        file_type: "batch",
        preview: previews.join("\n\n").slice(0, 1200) || `Processed ${files.length} images.`,
        content_ids: contentIds,
        status: result?.ok ? "ready" : "failed",
        raw: result
      };
    }

    function normalizeZipAttachment(result, file) {
      const contentIds = [];
      const previews = [];
      for (const item of (result?.items || [])) {
        const inner = item?.result || {};
        if (inner.content_id) contentIds.push(inner.content_id);
        if (Array.isArray(inner.items)) {
          for (const sub of inner.items) {
            if (sub.content_id) contentIds.push(sub.content_id);
            if (sub.preview) previews.push(sub.preview);
          }
        }
        if (inner.extracted_text_preview) previews.push(inner.extracted_text_preview);
      }

      return {
        id: `att_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
        title: stripExt(file.name),
        filename: file.name,
        kind: "zip",
        file_type: "zip",
        preview: previews.join("\n\n").slice(0, 1200) || `ZIP processed. Files: ${result?.count || 0}.`,
        content_ids: contentIds,
        status: result?.ok ? "ready" : "failed",
        raw: result
      };
    }

    async function runCapability(name, payload) {
      const url = `${state.brain.url}/capability/run`;
      const headers = { "Content-Type": "application/json" };
      if (state.brain.apiKey) headers["X-API-Key"] = state.brain.apiKey;

      const response = await fetchWithTimeout(url, {
        method: "POST",
        headers,
        body: JSON.stringify({ name, payload })
      }, 30000);

      if (!response.ok) {
        const text = await response.text().catch(() => "");
        throw new Error(`Capability HTTP ${response.status}${text ? ` — ${text}` : ""}`);
      }

      return response.json();
    }

    async function exportMessage(msg, format) {
      if (!state.brain.url) {
        aiPush("system", "Set your Brain URL first in Brain Config.");
        return;
      }

      try {
        setComposerBusy(true);

        const moduleTarget = msg.requestContext?.moduleTarget || "general";
        const title = guessExportTitle(moduleTarget, msg.text);
        const payload = {
          format,
          document_type: mapDocumentType(moduleTarget),
          title,
          filename_base: slugify(title),
          content: buildExportContent(moduleTarget, msg.text)
        };

        if (format === "pdf") payload.pdf_mode = "fast";

        const result = await runCapability("export_document", payload);

        if (result?.ok && result.download_url) {
          const absolute = `${state.brain.url}${result.download_url}`;
          aiPush("system", `Export ready: ${result.filename || title}`);
          window.open(absolute, "_blank");
        } else {
          aiPush("system", "Export did not return a download URL.");
        }
      } catch (err) {
        aiPush("system", classifyBrainError(err));
      } finally {
        setComposerBusy(false);
      }
    }

    function buildExportContent(moduleTarget, text) {
      if (moduleTarget === "lesson_plan_generate") {
        return { output: text };
      }
      if (moduleTarget === "test_generator") {
        return { text };
      }
      return { text };
    }

    function mapDocumentType(moduleTarget) {
      if (moduleTarget === "lesson_plan_generate") return "lesson_plan";
      if (moduleTarget === "test_generator") return "exam";
      return "plain_text";
    }

    function guessExportTitle(moduleTarget, text) {
      if (moduleTarget === "lesson_plan_generate") return "Lesson Plan";
      if (moduleTarget === "test_generator") return "Generated Test";
      if (moduleTarget === "coder") return "Coder Output";
      const firstLine = String(text || "").split("\n")[0].trim();
      return firstLine ? firstLine.slice(0, 60) : "MyTalk Export";
    }

    function slugify(value) {
      return String(value || "export")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "") || "export";
    }

    function isExportableMessage(msg) {
      return msg.role === "brain" && !!(msg.text || "").trim();
    }

    function parseTags(raw) {
      return String(raw || "")
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function detectPipelineType(uploaded, file) {
      const ext = file.name.toLowerCase().split(".").pop() || "";
      if (["png", "jpg", "jpeg", "webp"].includes(ext)) return "image";
      if (ext === "zip") return "zip";
      if (uploaded?.detected_type) {
        const low = String(uploaded.detected_type).toLowerCase();
        if (low.includes("image")) return "image";
        if (low.includes("zip")) return "zip";
      }
      return "document";
    }

    function isImageFile(file) {
      const name = String(file?.name || "").toLowerCase();
      return [".png", ".jpg", ".jpeg", ".webp"].some((ext) => name.endsWith(ext));
    }

    function isZipFile(file) {
      return String(file?.name || "").toLowerCase().endsWith(".zip");
    }

    function stripExt(name) {
      return String(name || "").replace(/\.[^.]+$/, "");
    }

    function fetchWithTimeout(url, options = {}, timeoutMs = 15000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      return fetch(url, { ...options, signal: controller.signal })
        .finally(() => clearTimeout(timer));
    }

    function classifyBrainError(err) {
      const raw = String(err?.message || err || "Unknown Brain error");
      if (raw.includes("Failed to fetch")) return "Could not reach Brain. Check URL, network, or Tailscale.";
      if (raw.includes("401") || raw.includes("403")) return "Brain rejected the request. Check the API key.";
      if (raw.includes("AbortError")) return "Brain request timed out.";
      return `Brain error: ${raw}`;
    }

    function updateLastActionSummary(actions) {
      if (!Array.isArray(actions) || !actions.length) {
        state.ui.lastActionSummary = "none";
        return;
      }

      const first = actions[0];
      const type = String(first?.type || "unknown");
      const payload = first?.payload || {};

      if (type === "spotify_control") {
        const target = payload.target_device || payload.device || state.brain.defaultSpotifyDevice;
        const what = payload.playlist || payload.song || payload.artist || payload.album || payload.action || "spotify";
        state.ui.lastActionSummary = `spotify → ${target} → ${what}`;
      } else if (payload.item) {
        state.ui.lastActionSummary = `${type} → ${payload.item}`;
      } else if (payload.text) {
        state.ui.lastActionSummary = `${type} → ${payload.text}`;
      } else {
        state.ui.lastActionSummary = type;
      }
    }

    function refreshBrainStatusUI() {
      const online = state.brain.lastStatus === "online";
      els.brainInlineStatus.textContent = online ? "🟢 Connected" : "🔴 Offline";
      els.brainInlineStatus.style.borderColor = online ? "rgba(47,191,113,0.45)" : "rgba(224,93,93,0.45)";
      els.brainInlineStatus.style.color = online ? "#b8f0cc" : "#ffb3b3";

      const savedUrl = state.brain.url
        ? `${state.brain.url}${state.brain.endpoint || "/chat"}`
        : "No Brain URL saved";
      els.helperState.textContent = savedUrl;
    }

    function refreshUIPills() {
      const savedUrl = state.brain.url
        ? `${state.brain.url}${state.brain.endpoint || "/chat"}`
        : "No Brain URL saved";
      const lastAction = state.ui.lastActionSummary || "none";
      const caps = (state.capabilities.names || []).length;
      els.helperState.textContent = `${lastAction} • ${caps} caps • ${savedUrl}`;
      els.capabilitiesNote.textContent = caps
        ? `Capabilities detected: ${(state.capabilities.names || []).slice(0, 8).join(", ")}${caps > 8 ? "..." : ""}`
        : "Supported via Brain pipeline: txt, md, pdf, docx, csv, xlsx, pptx, png, jpg, jpeg, webp, zip.";
    }

    async function testBrainConnection() {
      if (!state.brain.url) {
        aiPush("system", "Set your Brain URL first in Brain Config.");
        openConfigPanel();
        return;
      }

      const healthUrl = `${state.brain.url}/health`;

      try {
        const res = await fetchWithTimeout(healthUrl, { method: "GET" }, 8000);
        if (!res.ok) throw new Error(`Health HTTP ${res.status}`);
        aiPush("system", `Brain reachable at ${healthUrl}`);
        state.brain.lastStatus = "online";
        await discoverCapabilities();
      } catch (err) {
        aiPush("system", classifyBrainError(err));
        state.brain.lastStatus = "offline";
      } finally {
        saveState();
        refreshBrainStatusUI();
      }
    }

    async function discoverCapabilities() {
      const url = `${state.brain.url}/capabilities`;
      const headers = {};
      if (state.brain.apiKey) headers["X-API-Key"] = state.brain.apiKey;

      const res = await fetchWithTimeout(url, { method: "GET", headers }, 12000);
      if (!res.ok) return;

      const data = await res.json().catch(() => null);
      const names = extractCapabilityNames(data);
      state.capabilities.names = names;
      saveState();
      refreshUIPills();

      if (names.length) {
        aiPush("system", `Capabilities loaded: ${names.slice(0, 10).join(", ")}${names.length > 10 ? "..." : ""}`);
      }
    }

    function extractCapabilityNames(data) {
      if (Array.isArray(data)) {
        return data
          .map((item) => typeof item === "string" ? item : item?.name)
          .filter(Boolean);
      }
      if (Array.isArray(data?.capabilities)) {
        return data.capabilities
          .map((item) => typeof item === "string" ? item : item?.name)
          .filter(Boolean);
      }
      if (data && typeof data === "object") {
        return Object.keys(data).filter(Boolean);
      }
      return [];
    }

    function safeJson(value) {
      try {
        return JSON.stringify(value);
      } catch {
        return "[unserializable]";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => console.log("Service Worker registered"))
          .catch((err) => console.error("Service Worker failed:", err));
      });
    }
  </script>
</body>
